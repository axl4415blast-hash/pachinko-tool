<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パチンコデータ収集ツール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424;
    --border: #2e2e2e; --accent: #e8ff47; --text: #f0f0f0;
    --text2: #888; --text3: #555; --success: #47ff8a;
    --error: #ff4747; --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 720px; margin: 0 auto; }
  header { margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .logo { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; }
  h1 { font-size: 22px; font-weight: 700; }
  h1 span { color: var(--accent); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }
  .card-title { font-size: 11px; font-weight: 500; color: var(--text2); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 1rem; font-family: 'JetBrains Mono', monospace; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 12px; color: var(--text2); font-weight: 500; }
  input, select { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; padding: 10px 12px; width: 100%; transition: border-color 0.15s; outline: none; }
  input:focus { border-color: var(--accent); }
  .machine-presets { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .preset-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text2); cursor: pointer; font-size: 12px; font-family: 'Noto Sans JP', sans-serif; padding: 4px 10px; transition: all 0.15s; }
  .preset-btn:hover, .preset-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }
  .col-check { display: flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-size: 13px; padding: 6px 10px; transition: all 0.15s; user-select: none; }
  .col-check input { display: none; }
  .col-check.checked { background: rgba(232,255,71,0.1); border-color: var(--accent); color: var(--accent); }
  .columns-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .upload-zone { border: 1px dashed var(--border); border-radius: var(--radius); cursor: pointer; padding: 2rem; text-align: center; transition: all 0.15s; }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); }
  .upload-icon { color: var(--text3); font-size: 32px; margin-bottom: 12px; }
  .upload-text { color: var(--text2); font-size: 14px; }
  .upload-hint { color: var(--text3); font-size: 12px; margin-top: 4px; }
  #file-input { display: none; }
  .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; margin-top: 12px; }
  .preview-item { aspect-ratio: 3/4; border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; position: relative; }
  .preview-item img { width: 100%; height: 100%; object-fit: cover; }
  .preview-item .remove { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.7); border: none; border-radius: 50%; color: #fff; cursor: pointer; font-size: 14px; height: 22px; line-height: 22px; text-align: center; width: 22px; }
  .preview-item .num { position: absolute; bottom: 4px; left: 4px; background: rgba(0,0,0,0.7); border-radius: 3px; color: var(--accent); font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 2px 5px; }
  .info-box { background: rgba(232,255,71,0.07); border: 1px solid rgba(232,255,71,0.2); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 1rem; font-size: 13px; color: var(--accent); line-height: 1.7; }
  .submit-btn { background: var(--accent); border: none; border-radius: var(--radius); color: #000; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 700; padding: 14px; width: 100%; transition: opacity 0.15s; margin-top: 0.5rem; }
  .submit-btn:hover { opacity: 0.85; }
  .submit-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .status { border-radius: var(--radius); display: none; font-size: 13px; margin-top: 12px; padding: 12px 14px; line-height: 1.6; }
  .status.info { background: rgba(232,255,71,0.1); border: 1px solid rgba(232,255,71,0.3); color: var(--accent); display: block; }
  .status.success { background: rgba(71,255,138,0.1); border: 1px solid rgba(71,255,138,0.3); color: var(--success); display: block; }
  .status.error { background: rgba(255,71,71,0.1); border: 1px solid rgba(255,71,71,0.3); color: var(--error); display: block; }
  .status.loading { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text2); display: block; }
  .progress { display: none; margin-top: 16px; }
  .progress.show { display: block; }
  .progress-bar-bg { background: var(--surface2); border-radius: 4px; height: 4px; overflow: hidden; }
  .progress-bar { background: var(--accent); border-radius: 4px; height: 100%; transition: width 0.3s; width: 0%; }
  .progress-text { color: var(--text2); font-size: 12px; margin-top: 6px; font-family: 'JetBrains Mono', monospace; }
  .mono { font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  @media (max-width: 500px) { .grid-3, .grid-2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">Pachinko Data Collector</div>
    <h1>データ収集ツール <span>v2.0</span></h1>
  </header>

  <div class="card">
    <div class="card-title">API設定</div>
    <div class="field">
      <label>Google Apps Script URL</label>
      <input type="text" id="gas-url" class="mono" placeholder="https://script.google.com/macros/s/..." />
    </div>
    <div style="font-size:12px; color:var(--text3); margin-top:8px;">※ URLはこのブラウザに自動保存されます</div>
  </div>

  <div class="card">
    <div class="card-title">基本情報</div>
    <div class="grid-3">
      <div class="field">
        <label>店名</label>
        <input type="text" id="store-name" placeholder="○○店" />
      </div>
      <div class="field">
        <label>機種名（シート名と一致）</label>
        <input type="text" id="machine-name" placeholder="マイジャグラーV" />
      </div>
      <div class="field">
        <label>日付</label>
        <input type="date" id="date-input" />
      </div>
    </div>
    <div class="field">
      <label>機種プリセット</label>
      <div class="machine-presets">
        <button class="preset-btn" onclick="setPreset('マイジャグラーV',['BB','RB','スタート','総回転数','合成確率','BB確率','RB確率','最大枚数','前日最終','差枚'],this)">マイジャグV</button>
        <button class="preset-btn" onclick="setPreset('ファンキジャグラー２',['BB','RB','スタート','総回転数','合成確率','BB確率','RB確率','最大枚数','前日最終','差枚'],this)">ファンキー2</button>
        <button class="preset-btn" onclick="setPreset('ゴーゴージャグラー',['BB','RB','スタート','総回転数','合成確率','BB確率','RB確率','最大枚数','前日最終','差枚'],this)">ゴーゴージャグ</button>
        <button class="preset-btn" onclick="setPreset('ネオアイムジャグラー',['BB','RB','スタート','総回転数','合成確率','BB確率','RB確率','最大枚数','前日最終','差枚'],this)">ネオアイムジャグ</button>
        <button class="preset-btn" onclick="setPreset('ジャグラーガールズ',['BB','RB','スタート','総回転数','合成確率','BB確率','RB確率','最大枚数','前日最終','差枚'],this)">ジャグガールズ</button>
        <button class="preset-btn" onclick="setPreset('ウルトラミラクルジャグラー',['BB','RB','スタート','総回転数','合成確率','BB確率','RB確率','最大枚数','前日最終','差枚'],this)">ウルトラミラクル</button>
        <button class="preset-btn" onclick="setPreset('北斗転生',['BB','RB','スタート','総回転数','合成確率','BB確率','RB確率','最大枚数','前日最終','差枚'],this)">北斗転生</button>
        <button class="preset-btn" onclick="setPreset('東京喰種',['BB','RB','スタート','総回転数','合成確率','BB確率','RB確率','最大枚数','前日最終','差枚'],this)">東京喰種</button>
        <button class="preset-btn" onclick="setPreset('カバネリ２',['BB','RB','スタート','総回転数','合成確率','BB確率','RB確率','最大枚数','前日最終','差枚'],this)">カバネリ2</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">記録する項目</div>
    <div class="columns-grid" id="columns-grid">
      <label class="col-check checked" onclick="toggleCol(this)"><input type="checkbox" checked value="BB">BB</label>
      <label class="col-check checked" onclick="toggleCol(this)"><input type="checkbox" checked value="RB">RB</label>
      <label class="col-check" onclick="toggleCol(this)"><input type="checkbox" value="AT/ART">AT/ART</label>
      <label class="col-check checked" onclick="toggleCol(this)"><input type="checkbox" checked value="スタート">スタート</label>
      <label class="col-check checked" onclick="toggleCol(this)"><input type="checkbox" checked value="総回転数">総回転数</label>
      <label class="col-check checked" onclick="toggleCol(this)"><input type="checkbox" checked value="合成確率">合成確率</label>
      <label class="col-check checked" onclick="toggleCol(this)"><input type="checkbox" checked value="BB確率">BB確率</label>
      <label class="col-check checked" onclick="toggleCol(this)"><input type="checkbox" checked value="RB確率">RB確率</label>
      <label class="col-check checked" onclick="toggleCol(this)"><input type="checkbox" checked value="最大枚数">最大枚数</label>
      <label class="col-check checked" onclick="toggleCol(this)"><input type="checkbox" checked value="前日最終">前日最終</label>
      <label class="col-check checked" onclick="toggleCol(this)"><input type="checkbox" checked value="差枚">差枚</label>
    </div>
  </div>

  <div class="info-box">
    スクショのアップロード順について<br>
    1〜3枚目：台番号と項目名が両方写っているもの（例：892〜901）<br>
    4枚目以降：項目名なしでOK（同じ列順で自動判別）<br>
    ※ GAS側のOCRで処理するため、完了まで少し時間がかかります（1枚10〜30秒目安）
  </div>

  <div class="card">
    <div class="card-title">スクショをアップロード</div>
    <div class="upload-zone" id="upload-zone"
      onclick="document.getElementById('file-input').click()"
      ondragover="event.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')"
      ondrop="handleDrop(event)">
      <div class="upload-icon">+</div>
      <div class="upload-text">クリックまたはドラッグ＆ドロップ</div>
      <div class="upload-hint">まとめて選択OK ／ 1〜3枚目に項目名ありのスクショを</div>
    </div>
    <input type="file" id="file-input" multiple accept="image/*" onchange="handleFiles(this.files)" />
    <div class="preview-grid" id="preview-grid"></div>
  </div>

  <button class="submit-btn" id="submit-btn" onclick="handleSubmit()">
    OCRで読み取ってスプレッドシートへ保存
  </button>
  <div class="status" id="status"></div>
  <div class="progress" id="progress">
    <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="progress-text" id="progress-text">処理中...</div>
  </div>
</div>

<script>
document.getElementById('date-input').value = new Date().toISOString().split('T')[0];

// GAS URLをlocalStorageから復元
const savedGasUrl = localStorage.getItem('gas_url_collector');
if (savedGasUrl) document.getElementById('gas-url').value = savedGasUrl;

document.getElementById('gas-url').addEventListener('change', function() {
  localStorage.setItem('gas_url_collector', this.value);
});

let uploadedFiles = [];

function toggleCol(label) {
  const cb = label.querySelector('input');
  cb.checked = !cb.checked;
  label.classList.toggle('checked', cb.checked);
}

function setPreset(name, cols, btn) {
  document.getElementById('machine-name').value = name;
  document.querySelectorAll('.col-check').forEach(label => {
    const cb = label.querySelector('input');
    cb.checked = cols.includes(cb.value);
    label.classList.toggle('checked', cb.checked);
  });
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function handleFiles(files) { Array.from(files).forEach(addFile); }
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('upload-zone').classList.remove('drag');
  handleFiles(e.dataTransfer.files);
}

function addFile(file) {
  const idx = uploadedFiles.length;
  uploadedFiles.push(file);
  const grid = document.getElementById('preview-grid');
  const item = document.createElement('div');
  item.className = 'preview-item';
  item.id = 'preview-' + idx;
  const url = URL.createObjectURL(file);
  item.innerHTML = `<img src="${url}"><button class="remove" onclick="removeFile(${idx})">×</button><span class="num">${idx+1}</span>`;
  grid.appendChild(item);
}

function removeFile(idx) {
  uploadedFiles[idx] = null;
  const el = document.getElementById('preview-' + idx);
  if (el) el.remove();
}

function showStatus(msg, type) {
  const s = document.getElementById('status');
  s.innerHTML = msg;
  s.className = 'status ' + type;
}

function setProgress(pct, text) {
  const p = document.getElementById('progress');
  p.classList.toggle('show', pct >= 0);
  if (pct >= 0) {
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-text').textContent = text;
  }
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res({ data: r.result.split(',')[1], mimeType: file.type || 'image/png', name: file.name });
    r.onerror = () => rej(new Error('画像の読み込みに失敗しました'));
    r.readAsDataURL(file);
  });
}

async function handleSubmit() {
  const gasUrl = document.getElementById('gas-url').value.trim();
  const store = document.getElementById('store-name').value.trim();
  const machine = document.getElementById('machine-name').value.trim();
  const date = document.getElementById('date-input').value;
  const files = uploadedFiles.filter(f => f !== null);

  if (!gasUrl) { showStatus('Apps Script URLを入力してください', 'error'); return; }
  if (!store) { showStatus('店名を入力してください', 'error'); return; }
  if (!machine) { showStatus('機種名を入力してください', 'error'); return; }
  if (files.length === 0) { showStatus('スクショを1枚以上アップロードしてください', 'error'); return; }

  localStorage.setItem('gas_url_collector', gasUrl);

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  showStatus(`${files.length}枚のスクショをGASに送信中...`, 'loading');
  setProgress(10, '画像を変換中...');

  try {
    const images = await Promise.all(files.map(fileToBase64));
    setProgress(30, `GAS OCRで${images.length}枚を処理中... (しばらくお待ちください)`);

    // GASはリダイレクトが発生するためno-corsで送信し、
    // 完了確認はGET（jobIdポーリング）で行う
    const jobId = 'job_' + Date.now();

    await fetch(gasUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'ocr',
        sheetName: machine,
        date: date,
        images: images,
        jobId: jobId
      })
    });

    setProgress(50, 'OCR処理中... 完了を確認しています');

    // ポーリングで完了確認（最大120秒・3秒間隔）
    const result = await pollJobResult(gasUrl, jobId, 40, 3000);

    setProgress(100, '完了！');
    showStatus(`${result.count}台分のデータをスプレッドシートに保存しました`, 'success');

  } catch(err) {
    showStatus('エラー：' + err.message, 'error');
    setProgress(-1, '');
  }
  btn.disabled = false;
}

async function pollJobResult(gasUrl, jobId, maxRetry, interval) {
  for (let i = 0; i < maxRetry; i++) {
    await new Promise(r => setTimeout(r, interval));
    try {
      const res = await fetch(gasUrl + '?action=getJob&jobId=' + jobId);
      const data = await res.json();
      if (data.status === 'ok') return data;
      if (data.status === 'error') throw new Error(data.message);
      // status === 'pending' の場合は続けてポーリング
      const elapsed = ((i + 1) * interval / 1000).toFixed(0);
      setProgress(50 + Math.min(i * 1.2, 30), `OCR処理中... ${elapsed}秒経過`);
    } catch(e) {
      if (e.message && e.message !== 'Failed to fetch') throw e;
    }
  }
  throw new Error('タイムアウトしました。スプレッドシートを直接確認してください。');
}
</script>
</body>
</html>
